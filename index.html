<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">

    <title>Login</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="login-container">

    <h2>🔐 SAP LOGIN</h2>

    <input
        id="username"
        placeholder="Username"
    >

    <input
        id="password"
        type="password"
        placeholder="Password"
    >

    <button
        class="login-btn"
        onclick="login()"
    >
        LOGIN
    </button>

</div>

<script src="app.js"></script>

</body>
</html>
