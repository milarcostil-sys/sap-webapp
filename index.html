<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>SAP WEB APP</title>

  <style>

    body{
      font-family:Arial;
      background:#f4f4f4;
      padding:40px;
    }

    .box{
      background:white;
      padding:20px;
      border-radius:10px;
      width:500px;
    }

    input{
      width:100%;
      padding:10px;
      margin-top:10px;
    }

    button{
      width:100%;
      padding:10px;
      margin-top:10px;
      cursor:pointer;
    }

    pre{
      background:black;
      color:#00ff00;
      padding:10px;
      margin-top:20px;
      overflow:auto;
    }

  </style>

</head>

<body>

<div class="box">

<h2>🔐 LOGIN</h2>

<input
  id="username"
  placeholder="Username"
/>

<input
  id="password"
  type="password"
  placeholder="Password"
/>

<button onclick="login()">
  LOGIN
</button>

<hr>

<h2>🔎 ITEM SEARCH</h2>

<input
  id="code"
  placeholder="Item Code"
/>

<button onclick="getItem()">
  SEARCH
</button>

<pre id="result">
Waiting...
</pre>

</div>

<script>

const API_BASE =
"https://mia-vocal-officials-review.trycloudflare.com";

async function login() {

  try {

    const res = await fetch(
      API_BASE + "/login",
      {

        method: "POST",

        headers: {
          "Content-Type": "application/json"
        },

        body: JSON.stringify({

          username:
            document.getElementById("username").value,

          password:
            document.getElementById("password").value

        })

      }
    );

    const data = await res.json();

    if(data.token){

      localStorage.setItem(
        "token",
        data.token
      );

      alert("LOGIN SUCCESS");

    } else {

      alert(JSON.stringify(data));
    }

  } catch(err){

    alert(err);
  }
}

async function getItem() {

  const token =
    localStorage.getItem("token");

  if(!token){

    alert("LOGIN FIRST");

    return;
  }

  const code =
    document.getElementById("code").value;

  try {

    const res = await fetch(
      API_BASE + "/item/" + code,
      {

        method: "GET",

        headers: {
          "Authorization":
            "Bearer " + token
        }

      }
    );

    const data = await res.json();

    document.getElementById("result").innerText =
      JSON.stringify(data, null, 2);

  } catch(err){

    document.getElementById("result").innerText =
      err;
  }
}

</script>

</body>
</html>
