<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">

    <title>Arcosteel SAP Portal</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="login-page">

    <div class="login-card">

        <img
            src="arcosteel.jpg"
            class="logo"
            alt="Arcosteel">

        <h1>Arcosteel SAP Portal</h1>

        <input
            id="username"
            type="text"
            placeholder="Username">

        <input
            id="password"
            type="password"
            placeholder="Password">

        <div
            id="loginError"
            class="error-message">
        </div>

        <button
            class="login-btn"
            onclick="login()">

            Login

        </button>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
