<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Arcosteel Dashboard</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <img src="arcosteel.jpg" class="sidebar-logo">

        <button class="menu-btn" onclick="showModule('search')">
            🔍 Item Search
        </button>

        <button class="menu-btn" onclick="showModule('inventory')">
            📦 Inventory
        </button>

        <button class="menu-btn" onclick="showModule('prices')">
            💰 Prices
        </button>

        <button class="menu-btn" onclick="showModule('purchase')">
            🚚 Purchasing
        </button>

        <button class="logout-btn" onclick="logout()">
            Logout
        </button>

    </div>

    <!-- MAIN -->
    <div class="main">

        <div id="app">

            <h1>Welcome to Arcosteel System</h1>

            <div class="cards">

                <div class="card" onclick="showModule('search')">
                    🔍<br>Item Search
                </div>

                <div class="card">
                    📦<br>Inventory
                </div>

                <div class="card">
                    💰<br>Prices
                </div>

                <div class="card">
                    🚚<br>Purchasing
                </div>

            </div>

        </div>

    </div>

</div>

<script src="app.js"></script>

</body>

</html>
