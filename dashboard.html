<!DOCTYPE html>
<html lang="he">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Arcosteel SAP Portal</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="topbar">

    <div>
        <img
            src="arcosteel.jpg"
            class="top-logo"
            alt="Arcosteel">
    </div>

    <button
        class="logout-btn"
        onclick="logout()">

        Logout

    </button>

</div>

<div class="dashboard-grid">

    <div
        class="menu-card"
        onclick="showItemSearch()">

        <div class="menu-icon">🔍</div>

        <div class="menu-title">
            Item Search
        </div>

    </div>

    <div class="menu-card disabled">

        <div class="menu-icon">📦</div>

        <div class="menu-title">
            Inventory
        </div>

    </div>

    <div class="menu-card disabled">

        <div class="menu-icon">💰</div>

        <div class="menu-title">
            Price Lists
        </div>

    </div>

    <div class="menu-card disabled">

        <div class="menu-icon">🚚</div>

        <div class="menu-title">
            Purchasing
        </div>

    </div>

</div>

<div class="content-area">

    <div id="content">

        <div class="search-card">

            <h2>Item Search</h2>

            <input
                id="itemCode"
                placeholder="Enter Item Code">

            <button onclick="getItem()">
                Search
            </button>

        </div>

        <pre id="result">
Waiting...
        </pre>

    </div>

</div>

<script>

function showItemSearch(){

    document.getElementById("content").innerHTML = `

        <div class="search-card">

            <h2>Item Search</h2>

            <input
                id="itemCode"
                placeholder="Enter Item Code">

            <button onclick="getItem()">
                Search
            </button>

        </div>

        <pre id="result">
Waiting...
        </pre>

    `;
}

</script>

<script src="app.js"></script>

</body>
</html>
