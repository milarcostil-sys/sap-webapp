<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcosteel ERP</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <img src="arcosteel.jpg" class="sidebar-logo">

        <button class="menu-btn active" onclick="showModule('home')">🏠 Dashboard</button>
        <button class="menu-btn" onclick="showModule('items')">🔍 Items</button>
        <button class="menu-btn" onclick="showModule('stock')">📦 Stock</button>
        <button class="menu-btn" onclick="showModule('prices')">💰 Prices</button>
        <button class="menu-btn" onclick="showModule('purchase')">🚚 Purchase</button>

        <button class="logout-btn" onclick="logout()">Logout</button>

    </div>

    <!-- MAIN -->
    <div class="main">

        <div id="app">

            <h1>Welcome to Arcosteel ERP</h1>

            <!-- 🔍 SEARCH -->
            <div class="search-box">

                <input
                    type="text"
                    id="itemSearch"
                    placeholder="Search item code / name..."
                    onkeyup="searchItem()">

                <button onclick="searchItem()">🔍 Search</button>

            </div>

            <!-- DASHBOARD CARDS -->
            <div class="dashboard-cards">

                <div class="dash-card" onclick="showModule('items')">🔍<br>Items</div>
                <div class="dash-card" onclick="showModule('stock')">📦<br>Stock</div>
                <div class="dash-card" onclick="showModule('prices')">💰<br>Prices</div>
                <div class="dash-card" onclick="showModule('purchase')">🚚<br>Purchase</div>

            </div>

            <!-- RESULTS AREA -->
            <div id="results" style="margin-top:30px;"></div>

        </div>

    </div>

</div>

<script src="app.js"></script>

</body>

</html>
