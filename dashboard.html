<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Arcosteel SAP Portal</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="topbar">

    <img
        src="arcosteel.jpg"
        class="top-logo"
        alt="Arcosteel">

    <button
        class="logout-btn"
        onclick="logout()">

        Logout

    </button>

</div>

<div class="dashboard-grid">

    <div
        class="menu-card"
        onclick="showItemSearch()">

        <div class="menu-icon">🔍</div>

        <div class="menu-title">
            Item Search
        </div>

    </div>

</div>

<div class="content-area">

    <div id="content">

        <div class="search-card">

            <h2>Item Search</h2>

            <input
                id="itemCode"
                placeholder="Enter Item Code">

            <button
                class="primary-btn"
                onclick="getItem()">

                Search

            </button>

        </div>

        <div
            id="result"
            class="result-card">

            Waiting...

        </div>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
